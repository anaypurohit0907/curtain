# ── http-level header buffer limits ──────────────────────────────────────────
# These MUST be outside the server{} block: nginx reads headers before it
# selects a server block, so server-level large_client_header_buffers is too
# late. conf.d files are included directly inside the http{} context, so
# directives here apply at http scope.
#
# Default 1k/8k is too small for browsers with accumulated localhost cookies
# (all localhost dev tools — Supabase, Firebase emulators, etc. — share the
# same cookie jar).
client_header_buffer_size   4k;
large_client_header_buffers 8 32k;

server {
    listen 80;
    server_name localhost;

    # ── Auth Service ──────────────────────────────────────────────────────────
    location /auth/v1/ {
        rewrite ^/auth/v1/(.*) /$1 break;
        proxy_pass         http://auth:9999;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── Database Query (raw SQL via auth service) ─────────────────────────────
    location /db/v1/ {
        rewrite ^/db/v1/(.*) /$1 break;
        proxy_pass         http://auth:9999;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── REST API (PostgREST) ──────────────────────────────────────────────────
    location /rest/v1/ {
        rewrite ^/rest/v1/(.*) /$1 break;
        proxy_pass         http://postgrest:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── Realtime WebSocket ────────────────────────────────────────────────────
    location /realtime/v1/ {
        rewrite ^/realtime/v1/(.*) /$1 break;
        proxy_pass             http://realtime:4000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
    }

    # ── Edge Functions ────────────────────────────────────────────────────────
    location /functions/v1/ {
        rewrite ^/functions/v1/(.*) /$1 break;
        proxy_pass         http://edge:5555;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── Storage (JWT-authenticated gateway → MinIO) ───────────────────────────
    location /storage/v1/ {
        rewrite ^/storage/v1/(.*) /$1 break;
        proxy_pass         http://storage-gw:6333;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        client_max_body_size 100m;
    }

    # ── Health aggregator ─────────────────────────────────────────────────────
    location /health {
        return 200 '{"status":"ok","service":"curtain-dev"}';
        add_header Content-Type application/json;
    }

    # ── Dashboard (catch-all) ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://dashboard:80;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}
