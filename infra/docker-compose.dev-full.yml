# =============================================================================
# Curtain - Full Development Stack
# All services with port bindings, no TLS, hot-reloadable.
#
# Usage:
#   cd infra
#   docker compose -f docker-compose.dev-full.yml up --build -d
#   BASE_URL=http://localhost:8080 bash ../scripts/e2e-test.sh
# =============================================================================

version: "3.9"

networks:
  dev:
    driver: bridge

volumes:
  pg-dev-data:
  minio-dev-data:
  edge-fn-data:

services:

  # ─── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: curtain-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       curtain
      POSTGRES_USER:     curtain
      POSTGRES_PASSWORD: devpassword
    volumes:
      - pg-dev-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    networks: [dev]
    command: >
      postgres
        -c wal_level=logical
        -c max_wal_senders=3
        -c max_replication_slots=3
        -c log_min_duration_statement=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curtain"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ─── REST API ──────────────────────────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v12.2.0
    container_name: curtain-dev-postgrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI:       "postgres://curtain:devpassword@postgres:5432/curtain"
      PGRST_DB_SCHEMA:    "public,storage"
      PGRST_DB_ANON_ROLE: "anon"
      PGRST_JWT_SECRET:   "dev-jwt-secret-minimum-32-characters-long"
      PGRST_DB_POOL:      5
    networks: [dev]
    ports:
      - "3000:3000"

  # ─── Auth Service ──────────────────────────────────────────────────────────
  auth:
    build:
      context: ../services/auth
      dockerfile: Dockerfile
    container_name: curtain-dev-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://curtain:devpassword@postgres:5432/curtain"
      JWT_SECRET:   "dev-jwt-secret-minimum-32-characters-long"
      JWT_EXPIRY:   "3600"
      PORT:         "9999"
    networks: [dev]
    ports:
      - "9999:9999"

  # ─── Realtime Service ──────────────────────────────────────────────────────
  realtime:
    build:
      context: ../services/realtime
      dockerfile: Dockerfile
    container_name: curtain-dev-realtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://curtain:devpassword@postgres:5432/curtain"
      JWT_SECRET:   "dev-jwt-secret-minimum-32-characters-long"
      PORT:         "4000"
    networks: [dev]
    ports:
      - "4000:4000"

  # ─── Storage (MinIO) ───────────────────────────────────────────────────────
  storage:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: curtain-dev-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minio
      MINIO_ROOT_PASSWORD: devminiopassword
    volumes:
      - minio-dev-data:/data
    networks: [dev]
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  storage-init:
    image: minio/mc:latest
    container_name: curtain-dev-storage-init
    restart: "no"
    depends_on:
      storage:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init-buckets.sh"]
    volumes:
      - ./minio/init-buckets.sh:/init-buckets.sh:ro
    environment:
      MINIO_ROOT_USER:     minio
      MINIO_ROOT_PASSWORD: devminiopassword
    networks: [dev]

  # ─── Edge Functions ────────────────────────────────────────────────────────
  edge:
    build:
      context: ../services/edge
      dockerfile: Dockerfile
    container_name: curtain-dev-edge
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:        "postgres://curtain:devpassword@postgres:5432/curtain"
      JWT_SECRET:          "dev-jwt-secret-minimum-32-characters-long"
      PORT:                "5555"
      FUNCTION_TIMEOUT_MS: "10000"
    volumes:
      - edge-fn-data:/tmp/fn
    networks: [dev]
    ports:
      - "5555:5555"

  # ─── Storage Gateway (JWT → MinIO proxy) ────────────────────────────────────
  storage-gw:
    build:
      context: ../services/storage-gw
      dockerfile: Dockerfile
    container_name: curtain-dev-storage-gw
    restart: unless-stopped
    depends_on:
      storage:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT:      storage:9000
      MINIO_ROOT_USER:     minio
      MINIO_ROOT_PASSWORD: devminiopassword
      JWT_SECRET:          "dev-jwt-secret-minimum-32-characters-long"
      PORT:                "6333"
    networks: [dev]

  # ─── Dashboard (React SPA) ─────────────────────────────────────────────────
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8080"
    container_name: curtain-dev-dashboard
    restart: unless-stopped
    networks: [dev]

  # ─── Nginx Reverse Proxy (routes /auth/v1, /rest/v1, etc.) ────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: curtain-dev-nginx
    restart: unless-stopped
    volumes:
      - ./nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - auth
      - postgrest
      - realtime
      - edge
      - storage
      - storage-gw
      - dashboard
    networks: [dev]
