# =============================================================================
# Curtain - Development Docker Compose
# Exposes ports directly (no Caddy TLS needed locally).
# Services auto-restart on crash but are not mem-limited.
# =============================================================================

version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: curtain-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       curtain
      POSTGRES_USER:     curtain
      POSTGRES_PASSWORD: devpassword
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    command: >
      postgres
        -c wal_level=logical
        -c max_wal_senders=3
        -c max_replication_slots=3
        -c log_min_duration_statement=500
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curtain"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgrest:
    image: postgrest/postgrest:v12.2.0
    container_name: curtain-dev-postgrest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGRST_DB_URI:        "postgres://curtain:devpassword@postgres:5432/curtain"
      PGRST_DB_SCHEMA:     "public,storage"
      PGRST_DB_ANON_ROLE:  "anon"
      PGRST_JWT_SECRET:    "dev-jwt-secret-minimum-32-characters-long"
      PGRST_DB_POOL:        5
    ports:
      - "3000:3000"

  storage:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: curtain-dev-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minio
      MINIO_ROOT_PASSWORD: devminiopassword
    volumes:
      - minio-dev-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"    # MinIO console (browse at http://localhost:9001)

volumes:
  minio-dev-data:
