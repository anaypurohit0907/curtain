# =============================================================================
# PostgreSQL configuration tuned for 1-2 GB RAM VPS
# =============================================================================

# Connection settings
max_connections = 50                # Keep low; pgBouncer handles pooling at scale
superuser_reserved_connections = 3

# Memory (target: 1GB RAM VPS; scale up for 2GB)
shared_buffers         = 128MB      # 12-25% of RAM
effective_cache_size   = 512MB      # OS + Postgres cache estimate
work_mem               = 4MB        # Per-sort/hash; 50 conn * 4MB = 200MB peak
maintenance_work_mem   = 32MB       # VACUUM, CREATE INDEX

# WAL
wal_level                    = logical   # Required for LISTEN/NOTIFY + replication
max_wal_senders              = 3
max_replication_slots        = 3
wal_buffers                  = 16MB
checkpoint_completion_target = 0.9
min_wal_size                 = 512MB
max_wal_size                 = 2GB

# Query planner
random_page_cost          = 1.1     # SSD; use 4.0 for spinning disk
default_statistics_target = 100
effective_io_concurrency  = 200     # SSD IOPS

# Logging (useful for debugging on VPS)
log_min_duration_statement = 1000   # Log queries slower than 1s
log_line_prefix            = '%t [%p]: [%l-1] db=%d,user=%u '
log_checkpoints            = on
log_connections            = off    # Too noisy with connection pooling
log_disconnections         = off
log_lock_waits             = on

# Performance
fsync                   = on
synchronous_commit      = on
full_page_writes        = on        # Keep on for crash safety on VPS

# Autovacuum (keep defaults, they're fine for small deployments)
autovacuum              = on
