name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Go: Auth Service ─────────────────────────────────────────────────────────
  test-auth:
    name: Auth Service (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: services/auth/go.sum

      - name: Download dependencies
        working-directory: services/auth
        run: go mod download

      - name: Vet
        working-directory: services/auth
        run: go vet ./...

      - name: Test (with race detector)
        working-directory: services/auth
        run: go test -race -v -count=1 -timeout=60s ./...

  # ── Go: Realtime Service ──────────────────────────────────────────────────────
  test-realtime:
    name: Realtime Service (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: services/realtime/go.sum

      - name: Download dependencies
        working-directory: services/realtime
        run: go mod download

      - name: Vet
        working-directory: services/realtime
        run: go vet ./...

      - name: Test (with race detector)
        working-directory: services/realtime
        run: go test -race -v -count=1 -timeout=60s ./...

  # ── Go: Edge Service ──────────────────────────────────────────────────────────
  test-edge:
    name: Edge Service (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: services/edge/go.sum

      - name: Download dependencies
        working-directory: services/edge
        run: go mod download

      - name: Vet
        working-directory: services/edge
        run: go vet ./...

      - name: Test (with race detector)
        working-directory: services/edge
        run: go test -race -v -count=1 -timeout=60s ./...

  # ── TypeScript SDK ────────────────────────────────────────────────────────────
  test-sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        working-directory: sdk
        run: npm ci

      - name: Type check
        working-directory: sdk
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: sdk
        run: npm test

  # ── Dashboard ─────────────────────────────────────────────────────────────────
  test-dashboard:
    name: Dashboard (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Type check
        working-directory: dashboard
        run: npx tsc --noEmit

      - name: Test
        working-directory: dashboard
        run: npm test

      - name: Build (verify production build works)
        working-directory: dashboard
        run: npm run build
        env:
          VITE_API_URL: http://localhost

  # ── Docker build validation ───────────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [test-auth, test-realtime, test-edge, test-sdk]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build auth image
        uses: docker/build-push-action@v5
        with:
          context: services/auth
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build realtime image
        uses: docker/build-push-action@v5
        with:
          context: services/realtime
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build edge image
        uses: docker/build-push-action@v5
        with:
          context: services/edge
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: dashboard
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
